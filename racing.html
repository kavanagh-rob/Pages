<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Live Racing — TV Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#08090e;--surface:#0f1117;--card:#12141e;--card-hi:#171a28;
    --border:#1a1d2e;--text:#d8dae5;--text-mid:#8a8da3;--text-dim:#4e5168;
    --green:#34d399;--green-dim:rgba(52,211,153,0.08);
    --gold:#fbbf24;--gold-dim:rgba(251,191,36,0.08);
    --silver:#94a3b8;--silver-dim:rgba(148,163,184,0.06);
    --bronze:#d97706;--bronze-dim:rgba(217,119,6,0.06);
    --radius:10px;
  }
  html,body{
    width:1920px;height:1080px;
    background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,sans-serif;
    overflow:hidden;-webkit-font-smoothing:antialiased;
  }
  .page{
    width:1920px;height:1080px;
    display:flex;flex-direction:column;
    padding:16px 36px 12px;
  }

  /* === HEADER BAR — single compact line === */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    height:32px;margin-bottom:10px;flex-shrink:0;
  }
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .back-btn{
    display:inline-flex;align-items:center;gap:5px;
    background:var(--surface);border:1px solid var(--border);border-radius:6px;
    padding:4px 14px;color:var(--text-dim);font-family:'Inter',sans-serif;
    font-size:12px;cursor:pointer;text-decoration:none;transition:all 0.2s;
  }
  .back-btn:focus{outline:none;border-color:var(--green);color:var(--text);box-shadow:0 0 0 2px rgba(52,211,153,0.2)}
  .page-title{font-size:16px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
  .page-title em{font-style:normal;color:var(--green)}

  .topbar-right{display:flex;align-items:center;gap:14px}
  .live-pill{
    display:flex;align-items:center;gap:5px;
    background:var(--green-dim);border:1px solid rgba(52,211,153,0.15);
    border-radius:100px;padding:3px 10px 3px 8px;
    font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--green);
  }
  .live-pill .dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
  .status-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
  .status-live{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,211,153,.15)}
  .status-cached{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(251,191,36,.15)}
  .refresh-text{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)}
  .clock{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:var(--text-mid);letter-spacing:1px}

  /* === TABS — compact inline === */
  .tabs{display:flex;gap:4px;margin-bottom:8px;flex-shrink:0}
  .tab{
    background:var(--surface);border:1px solid var(--border);border-radius:6px;
    padding:4px 16px;font-size:12px;font-weight:600;
    text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);
    cursor:pointer;transition:all .2s;white-space:nowrap;
  }
  .tab:focus{outline:none;border-color:var(--green);color:var(--text);box-shadow:0 0 0 2px rgba(52,211,153,.2)}
  .tab.active{background:var(--green-dim);border-color:rgba(52,211,153,.25);color:var(--green)}

  /* === RESULTS GRID — 4 columns for density === */
  .results-area{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
  .results-area::-webkit-scrollbar{display:none}
  .results-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    padding-bottom:4px;
  }

  /* === RACE CARD — compact tile === */
  .race-card{
    background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;
    transition:all .22s cubic-bezier(.22,1,.36,1);
    animation:fadeUp .35s ease both;
    position:relative;
  }
  .race-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--green),transparent);
    opacity:0;transition:opacity .2s;
  }
  .race-card:focus{
    outline:none;border-color:var(--green);
    box-shadow:0 0 0 2px rgba(52,211,153,.18),0 6px 20px rgba(0,0,0,.35);
    transform:scale(1.02);background:var(--card-hi);
  }
  .race-card:focus::before{opacity:1}
  .race-card:nth-child(1){animation-delay:.02s}.race-card:nth-child(2){animation-delay:.04s}
  .race-card:nth-child(3){animation-delay:.06s}.race-card:nth-child(4){animation-delay:.08s}
  .race-card:nth-child(5){animation-delay:.10s}.race-card:nth-child(6){animation-delay:.12s}
  .race-card:nth-child(7){animation-delay:.14s}.race-card:nth-child(8){animation-delay:.16s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* Card header */
  .card-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px 8px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,rgba(255,255,255,.01),transparent);
  }
  .card-head-left{display:flex;align-items:center;gap:8px}
  .card-time{
    font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;
    color:var(--green);background:var(--green-dim);
    padding:2px 8px;border-radius:5px;letter-spacing:.5px;
  }
  .card-venue{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text)}
  .card-runners{font-size:10px;color:var(--text-dim);letter-spacing:.3px}

  /* Horse rows */
  .horse-rows{padding:6px 12px 10px}
  .horse-row{
    display:grid;
    grid-template-columns:28px 1fr auto;
    align-items:center;gap:8px;
    padding:4px 0;
  }
  .horse-row+.horse-row{border-top:1px solid rgba(255,255,255,.03)}

  .pos-badge{
    width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    border-radius:6px;font-size:11px;font-weight:700;
    font-family:'JetBrains Mono',monospace;
    background:var(--surface);color:var(--text-dim);border:1px solid var(--border);
  }
  .pos-1{background:var(--gold-dim);color:var(--gold);border-color:rgba(251,191,36,.2)}
  .pos-2{background:var(--silver-dim);color:var(--silver);border-color:rgba(148,163,184,.12)}
  .pos-3{background:var(--bronze-dim);color:var(--bronze);border-color:rgba(217,119,6,.12)}

  .horse-name{
    font-size:13px;font-weight:500;letter-spacing:.2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    line-height:1.2;
  }
  .horse-name.winner{color:var(--gold)}

  .horse-odds{
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;
    color:var(--text-mid);text-align:right;white-space:nowrap;
  }
  .fav-tag{
    display:inline-block;font-size:8px;font-weight:700;
    text-transform:uppercase;letter-spacing:1px;
    color:var(--green);background:var(--green-dim);
    padding:0 5px;border-radius:3px;margin-left:4px;
    vertical-align:middle;
  }

  /* Expandable detail panel */
  .card-details{
    max-height:0;opacity:0;overflow:hidden;
    transition:max-height .3s ease,opacity .25s ease,padding .25s ease;
    padding:0 14px;border-top:0 solid var(--border);
  }
  .card-details.expanded{
    max-height:200px;opacity:1;padding:8px 14px 10px;
    border-top:1px solid var(--border);
  }
  .details-inner{
    display:grid;grid-template-columns:1fr 1fr;
    gap:3px 16px;
  }
  .det-row{display:flex;justify-content:space-between;padding:2px 0}
  .det-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
  .det-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text)}

  /* Footer */
  .nav-hint{
    flex-shrink:0;text-align:center;padding-top:8px;
    font-size:10px;color:var(--text-dim);letter-spacing:.5px;
  }
  .nav-hint kbd{
    display:inline-block;background:var(--surface);border:1px solid var(--border);
    border-radius:3px;padding:0 5px;font-family:'JetBrains Mono',monospace;
    font-size:9px;margin:0 1px;
  }

  /* Empty state */
  .state-msg{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:14px;letter-spacing:.5px}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="back-btn" tabindex="0">&#8592; Back</a>
      <div class="page-title"><em>Live</em> Racing Results</div>
    </div>
    <div class="topbar-right">
      <div class="live-pill"><span class="dot"></span>Live</div>
      <span class="status-badge status-cached" id="statusBadge">CACHED</span>
      <span class="refresh-text" id="updateTimer">60s</span>
      <div class="clock" id="clock"></div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="results-area" id="results"></div>
  <div class="nav-hint">
    <kbd>&#8592;</kbd><kbd>&#8594;</kbd><kbd>&#8593;</kbd><kbd>&#8595;</kbd> navigate &middot; <kbd>Enter</kbd> expand &middot; <kbd>Backspace</kbd> home &middot; auto-refresh 60s
  </div>
</div>
<script>
(function(){
'use strict';

function updateClock(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
updateClock();setInterval(updateClock,10000);

var FALLBACK=[
  {time:"16:12",venue:"Chelmsford City",horses:[{p:1,name:"Campani",draw:"8",odds:"18/1"},{p:2,name:"Secret Road (IRE)",draw:"7",odds:"3/1"},{p:3,name:"Up The Monk",draw:"9",odds:"12/1"}],details:{trainer:"D M Simcock",jockey:"Joey Haynes",runners:"11 ran",dist:"1\u00BC, 2\u00BE",fav:"Kondratiev Wave 15/8F",tote:"\u00A319.70"}},
  {time:"16:00",venue:"Fontwell",horses:[{p:1,name:"Bradman",draw:"15",odds:"14/1"},{p:2,name:"Lexie's Moon",draw:"10",odds:"16/1"},{p:3,name:"Motazzen (IRE)",draw:"13",odds:"14/1"}],details:{trainer:"K Bishop",jockey:"James Best",runners:"14 ran",dist:"2, 1",fav:"Activist (FR) 4/1F",tote:"\u00A315.00"}},
  {time:"15:42",venue:"Chelmsford City",horses:[{p:1,name:"North View",draw:"5",odds:"11/2"},{p:2,name:"Diamondonthehill",draw:"1",odds:"4/1 f"},{p:3,name:"Monsieur Kodi (IRE)",draw:"9",odds:"9/1"}],details:{trainer:"S C Williams",jockey:"Gina Mangan",runners:"11 ran",dist:"\u00BE, 1\u00BE",tote:"\u00A36.90"}},
  {time:"15:30",venue:"Fontwell",horses:[{p:1,name:"Alright Dai (IRE)",draw:"1",odds:"7/4 f"},{p:2,name:"Hatos (FR)",draw:"7",odds:"11/2"}],details:{trainer:"N P Mulholland",jockey:"C O'Farrell",runners:"6 ran",dist:"6\u00BD",tote:"\u00A33.10"}},
  {time:"15:12",venue:"Chelmsford City",horses:[{p:1,name:"Dream Composer (IRE)",draw:"4",odds:"5/2"},{p:2,name:"Spirit Dancer",draw:"2",odds:"7/2"},{p:3,name:"Harbour Front",draw:"6",odds:"10/1"}],details:{trainer:"J Tuite",jockey:"R Havlin",runners:"9 ran",dist:"2, nk"}},
  {time:"15:00",venue:"Fontwell",horses:[{p:1,name:"Sizing Cusimano (IRE)",draw:"3",odds:"6/4 f"},{p:2,name:"Our Doris",draw:"5",odds:"9/2"},{p:3,name:"Bagatelle (FR)",draw:"1",odds:"7/1"}],details:{trainer:"G L Moore",jockey:"J J Burke",runners:"7 ran",dist:"3\u00BD, 8"}},
  {time:"14:30",venue:"Punchestown",horses:[{p:1,name:"Doyen Breed (IRE)",draw:"2",odds:"11/4"},{p:2,name:"Firm Footings (IRE)",draw:"6",odds:"5/1"},{p:3,name:"Inca Prince (IRE)",draw:"4",odds:"8/1"}],details:{trainer:"W P Mullins",jockey:"P Townend",runners:"11 ran",dist:"1\u00BD, 3\u00BC"}},
  {time:"14:00",venue:"Punchestown",horses:[{p:1,name:"Harbour Lake (IRE)",draw:"1",odds:"4/6 f"},{p:2,name:"Ballybrown (IRE)",draw:"3",odds:"5/1"}],details:{trainer:"H De Bromhead",jockey:"R Blackmore",runners:"5 ran",dist:"12"}}
];

var allRaces=FALLBACK,activeFilter='all',countdown=60,isLive=false;
renderTabs();renderResults();updateStatus();
attemptLiveFetch();

setInterval(function(){
  countdown--;
  if(countdown<=0){countdown=60;attemptLiveFetch();}
  document.getElementById('updateTimer').textContent=countdown+'s';
},1000);

async function attemptLiveFetch(){
  var PROXIES=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?','https://api.codetabs.com/v1/proxy?quest='];
  var TARGET='https://www.sportinglife.com/racing/fast-results';
  try{
    var html=null;
    for(var i=0;i<PROXIES.length;i++){
      try{
        var c=new AbortController();var t=setTimeout(function(){c.abort()},8000);
        var r=await fetch(PROXIES[i]+encodeURIComponent(TARGET),{cache:'no-store',signal:c.signal});
        clearTimeout(t);
        if(r.ok){html=await r.text();if(html&&html.length>500)break;html=null;}
      }catch(e){continue;}
    }
    if(html){
      var parsed=parseHTML(html);
      if(parsed&&parsed.length>0){allRaces=parsed;isLive=true;renderTabs();renderResults();updateStatus();return;}
    }
  }catch(e){}
  isLive=false;updateStatus();
}

function parseHTML(html){
  try{
    var doc=new DOMParser().parseFromString(html,'text/html');
    var races=[],seen={};
    var links=doc.querySelectorAll('a[href*="/racing/results/"]');
    for(var i=0;i<links.length;i++){
      var link=links[i];
      if(link.textContent.indexOf('Full Result')===-1)continue;
      var href=link.getAttribute('href')||'';
      var parts=href.split('/');var slug=parts[4]||'';
      var venue=slug.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()});
      var container=link.parentElement;
      for(var u=0;u<12;u++){if(!container||!container.parentElement)break;container=container.parentElement;var ct=container.textContent||'';if(ct.indexOf('Winning Trainer')!==-1||ct.indexOf('Tote Win')!==-1)break;}
      if(!container)continue;
      var block=container.textContent||'';
      var tm=block.match(/(\d{2}:\d{2})/);if(!tm)continue;
      var time=tm[1];var key=time+'|'+venue;if(seen[key])continue;seen[key]=true;
      var horses=[];var hl=container.querySelectorAll('a[href*="/racing/profiles/horse/"]');var sh={};
      for(var h=0;h<hl.length;h++){
        var n=hl[h].textContent.trim();if(!n||sh[n])continue;sh[n]=true;
        var pt=(hl[h].parentElement?hl[h].parentElement.textContent:'')||'';
        var an=pt.split(n)[1]||'';var om=an.match(/(\d+\/\d+\s*[fF]?)/);
        var bn=pt.split(n)[0]||'';var dm=bn.match(/(\d+)\s*$/);
        horses.push({p:horses.length+1,name:n,draw:dm?dm[1]:'',odds:om?om[1].trim():''});
      }
      var details={};
      [['trainer',/Winning Trainer:\s*([^\n|]+)/],['jockey',/Winning Jockey:\s*([^\n|]+)/],['runners',/Runners:\s*([^\n|]+)/],['dist',/Distances?:\s*([^\n|]+)/],['fav',/Fav:\s*([^\n|]+)/],['tote',/Tote Win:\s*([^\n|]+)/]].forEach(function(p){var m=block.match(p[1]);if(m)details[p[0]]=m[1].trim()});
      if(horses.length>0)races.push({time:time,venue:venue,horses:horses,details:details});
    }
    return races.sort(function(a,b){return b.time.localeCompare(a.time)});
  }catch(e){return[];}
}

function updateStatus(){
  var b=document.getElementById('statusBadge');
  if(isLive){b.className='status-badge status-live';b.textContent='LIVE';}
  else{b.className='status-badge status-cached';b.textContent='CACHED';}
}

function renderTabs(){
  var vs={};for(var i=0;i<allRaces.length;i++)vs[allRaces[i].venue]=true;
  var vl=Object.keys(vs).sort();
  var el=document.getElementById('tabs');
  var h='<button class="tab'+(activeFilter==='all'?' active':'')+'" data-filter="all" tabindex="0">All</button>';
  for(var v=0;v<vl.length;v++){
    h+='<button class="tab'+(activeFilter===vl[v]?' active':'')+'" data-filter="'+vl[v]+'" tabindex="0">'+vl[v]+'</button>';
  }
  el.innerHTML=h;
  el.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      activeFilter=this.getAttribute('data-filter');
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
      this.classList.add('active');renderResults();
    });
  });
}

function renderResults(){
  var c=document.getElementById('results');
  var filtered=[];
  for(var i=0;i<allRaces.length;i++){
    if(activeFilter==='all'||allRaces[i].venue===activeFilter)filtered.push(allRaces[i]);
  }
  if(!filtered.length){c.innerHTML='<div class="state-msg">No results available</div>';return;}

  var COLS=4;
  var h='<div class="results-grid">';
  for(var r=0;r<filtered.length;r++){
    var race=filtered[r];var d=race.details;
    h+='<div class="race-card" tabindex="0" data-row="'+Math.floor(r/COLS)+'" data-col="'+(r%COLS)+'">';

    // Header
    h+='<div class="card-head"><div class="card-head-left">';
    h+='<span class="card-time">'+race.time+'</span>';
    h+='<span class="card-venue">'+race.venue+'</span>';
    h+='</div>';
    h+='<span class="card-runners">'+(d.runners||'')+'</span>';
    h+='</div>';

    // Horses
    h+='<div class="horse-rows">';
    for(var hi=0;hi<race.horses.length;hi++){
      var hr=race.horses[hi];
      var pc=hr.p<=3?' pos-'+hr.p:'';
      var nc=hr.p===1?' winner':'';
      var isFav=/f$/i.test(hr.odds);
      h+='<div class="horse-row">';
      h+='<div class="pos-badge'+pc+'">'+hr.p+'</div>';
      h+='<div class="horse-name'+nc+'">'+hr.name+'</div>';
      h+='<div class="horse-odds">'+hr.odds+(isFav?'<span class="fav-tag">F</span>':'')+'</div>';
      h+='</div>';
    }
    h+='</div>';

    // Details
    var hasDet=d.trainer||d.jockey||d.fav||d.tote;
    if(hasDet){
      h+='<div class="card-details"><div class="details-inner">';
      if(d.trainer)h+='<div class="det-row"><span class="det-label">Trainer</span><span class="det-val">'+d.trainer+'</span></div>';
      if(d.jockey)h+='<div class="det-row"><span class="det-label">Jockey</span><span class="det-val">'+d.jockey+'</span></div>';
      if(d.fav)h+='<div class="det-row"><span class="det-label">Unpl Fav</span><span class="det-val">'+d.fav+'</span></div>';
      if(d.tote)h+='<div class="det-row"><span class="det-label">Tote Win</span><span class="det-val">'+d.tote+'</span></div>';
      if(d.dist)h+='<div class="det-row"><span class="det-label">Distances</span><span class="det-val">'+d.dist+'</span></div>';
      h+='</div></div>';
    }
    h+='</div>';
  }
  h+='</div>';
  c.innerHTML=h;
  setupCards();
}

function setupCards(){
  document.querySelectorAll('.race-card').forEach(function(card){
    function toggle(){var det=card.querySelector('.card-details');if(det)det.classList.toggle('expanded')}
    card.addEventListener('click',toggle);
    card.addEventListener('keydown',function(e){if(e.key==='Enter')toggle()});
  });
}

// 2D grid nav
var COLS=4;
document.getElementById('results').addEventListener('keydown',function(e){
  var tiles=Array.prototype.slice.call(document.querySelectorAll('.race-card'));
  var idx=tiles.indexOf(document.activeElement);if(idx===-1)return;
  var row=Math.floor(idx/COLS),col=idx%COLS,total=Math.ceil(tiles.length/COLS),ni=-1;
  switch(e.key){
    case'ArrowDown':if(row<total-1){ni=Math.min((row+1)*COLS+col,tiles.length-1)}break;
    case'ArrowUp':if(row>0){ni=(row-1)*COLS+col}else{e.preventDefault();var at=document.querySelector('.tab.active');if(at)at.focus();return;}break;
    case'ArrowRight':if(col<COLS-1&&idx+1<tiles.length)ni=idx+1;break;
    case'ArrowLeft':if(col>0)ni=idx-1;break;
  }
  if(ni>=0&&ni<tiles.length){e.preventDefault();tiles[ni].focus();tiles[ni].scrollIntoView({behavior:'smooth',block:'nearest'})}
  else if(e.key==='ArrowDown'||e.key==='ArrowUp')e.preventDefault();
});

document.getElementById('tabs').addEventListener('keydown',function(e){
  var tabs=Array.prototype.slice.call(document.querySelectorAll('.tab'));var idx=tabs.indexOf(document.activeElement);
  if(e.key==='ArrowRight'&&idx<tabs.length-1){e.preventDefault();tabs[idx+1].focus()}
  if(e.key==='ArrowLeft'&&idx>0){e.preventDefault();tabs[idx-1].focus()}
  if(e.key==='ArrowDown'){e.preventDefault();var f=document.querySelector('.race-card');if(f)f.focus()}
  if(e.key==='Enter'&&document.activeElement)document.activeElement.click();
});

document.addEventListener('keydown',function(e){if(e.key==='Backspace'){e.preventDefault();window.location.href='index.html'}});

})();
</script>
</body>
</html>
