<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Horse Racing — TV Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #060810;
    --surface: #0e1018;
    --card: #12141e;
    --border: #1c1e2e;
    --text: #e8e8ec;
    --text-dim: #6e7090;
    --green: #00c853;
    --green-dim: rgba(0,200,83,0.12);
    --gold: #ffd700;
    --silver: #b0bec5;
    --bronze: #cd7f32;
    --radius: 14px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    padding: 36px 56px 24px;
    background:
      radial-gradient(ellipse 80% 50% at 10% 10%, rgba(0,200,83,0.05), transparent),
      radial-gradient(ellipse 60% 40% at 90% 90%, rgba(0,100,200,0.03), transparent),
      var(--bg);
  }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; flex-shrink: 0; flex-wrap: wrap; gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 20px; }
  .back-btn {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 22px; color: var(--text-dim); font-family: 'Source Sans 3', sans-serif;
    font-size: 16px; cursor: pointer; text-decoration: none; transition: all 0.2s ease;
  }
  .back-btn:focus { outline: none; border-color: var(--green); color: var(--text); box-shadow: 0 0 0 3px rgba(0,200,83,0.3); }
  .page-title { font-family: 'Oswald', sans-serif; font-size: 36px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .page-title span { color: var(--green); }

  .topbar-right { display: flex; align-items: center; gap: 20px; }
  .live-indicator { display: flex; align-items: center; gap: 8px; font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--green); }
  .live-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; box-shadow: 0 0 8px rgba(0,200,83,0.5); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }

  .status-badge { font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 5px 14px; border-radius: 8px; letter-spacing: 0.5px; }
  .status-live { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,200,83,0.25); }
  .status-cached { background: rgba(255,214,0,0.1); color: #ffd700; border: 1px solid rgba(255,214,0,0.2); }
  .update-timer { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-dim); }
  .clock { font-family: 'Oswald', sans-serif; font-size: 32px; font-weight: 400; color: var(--text-dim); letter-spacing: 2px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-shrink: 0; overflow-x: auto; }
  .tab {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 28px; font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); cursor: pointer;
    transition: all 0.2s ease; white-space: nowrap;
  }
  .tab:focus { outline: none; border-color: var(--green); color: var(--text); box-shadow: 0 0 0 3px rgba(0,200,83,0.3); }
  .tab.active { background: var(--green-dim); border-color: rgba(0,200,83,0.4); color: var(--green); }

  .results-scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent; padding-right: 12px;
  }
  .results-scroll::-webkit-scrollbar { width: 6px; }
  .results-scroll::-webkit-scrollbar-track { background: transparent; }
  .results-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .race-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 16px; padding: 24px 32px; transition: all 0.25s cubic-bezier(.22,1,.36,1);
    cursor: pointer; animation: cardIn 0.4s ease both;
  }
  .race-card:nth-child(1){animation-delay:.05s} .race-card:nth-child(2){animation-delay:.1s}
  .race-card:nth-child(3){animation-delay:.15s} .race-card:nth-child(4){animation-delay:.2s}
  .race-card:nth-child(5){animation-delay:.25s} .race-card:nth-child(6){animation-delay:.3s}
  .race-card:nth-child(7){animation-delay:.35s} .race-card:nth-child(8){animation-delay:.4s}
  @keyframes cardIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .race-card:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,200,83,0.25); transform: scale(1.008); }

  .race-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .race-header-left { display: flex; align-items: center; gap: 16px; }
  .race-time { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; color: var(--green); background: var(--green-dim); padding: 4px 14px; border-radius: 8px; }
  .race-venue { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
  .race-meta { display: flex; gap: 16px; font-size: 15px; color: var(--text-dim); align-items: center; }
  .race-meta-item { display: flex; align-items: center; gap: 6px; }
  .expand-hint { font-size: 13px; color: var(--text-dim); opacity: 0; transition: opacity 0.2s; }
  .race-card:focus .expand-hint { opacity: 1; }

  .horse-row { display: grid; grid-template-columns: 44px 1fr 120px; align-items: center; padding: 10px 0; gap: 16px; }
  .horse-row + .horse-row { border-top: 1px solid rgba(255,255,255,0.04); }

  .position { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }
  .pos-1 { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
  .pos-2 { background: rgba(176,190,197,0.12); color: var(--silver); border: 1px solid rgba(176,190,197,0.2); }
  .pos-3 { background: rgba(205,127,50,0.12); color: var(--bronze); border: 1px solid rgba(205,127,50,0.2); }

  .horse-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .horse-number { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); background: var(--surface); border-radius: 6px; padding: 2px 8px; flex-shrink: 0; }
  .horse-name { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 500; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .winner-name { color: var(--gold); }
  .horse-odds { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; }
  .fav-tag { display: inline-block; font-size: 10px; color: var(--green); background: var(--green-dim); padding: 1px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; margin-left: 8px; vertical-align: middle; }

  .race-details {
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 6px 32px; font-size: 15px; overflow: hidden; max-height: 0; opacity: 0;
    margin-top: 0; padding-top: 0;
    transition: max-height 0.35s ease, opacity 0.3s ease, margin-top 0.3s ease, padding-top 0.3s ease;
  }
  .race-details.expanded { max-height: 300px; opacity: 1; margin-top: 14px; padding-top: 14px; }
  .detail-row { display: flex; justify-content: space-between; padding: 5px 0; }
  .detail-label { color: var(--text-dim); }
  .detail-value { font-weight: 600; text-align: right; }

  .state-message { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .state-text { font-family: 'Oswald', sans-serif; font-size: 22px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }

  .nav-hint { flex-shrink: 0; text-align: center; padding-top: 16px; font-size: 14px; color: var(--text-dim); letter-spacing: 1px; }
  .nav-hint kbd { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; font-family: 'Source Sans 3', sans-serif; font-size: 13px; margin: 0 2px; }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="back-btn" id="backBtn" tabindex="0">← Back</a>
      <div class="page-title">🏇 <span>Live</span> Racing Results</div>
    </div>
    <div class="topbar-right">
      <div class="live-indicator"><span class="live-dot"></span> Live</div>
      <span class="status-badge status-cached" id="statusBadge">CACHED</span>
      <div class="update-timer" id="updateTimer">Refreshing in 60s</div>
      <div class="clock" id="clock"></div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="results-scroll" id="results"></div>
  <div class="nav-hint">
    <kbd>↑</kbd><kbd>↓</kbd> Navigate &nbsp;·&nbsp; <kbd>Enter</kbd> Expand details &nbsp;·&nbsp; <kbd>←</kbd><kbd>→</kbd> Filter tabs &nbsp;·&nbsp; <kbd>Backspace</kbd> Home &nbsp;·&nbsp; Auto-refresh 60s
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===== Clock =====
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ===== Embedded race data (scraped from Sporting Life) =====
  const FALLBACK_RACES = [
    {

      ],

    },

      horses: [

      ],
      details: { trainer: "S C Williams", jockey: "Gina Mangan", runners: "11 ran", distances: "\u00BE, 1\u00BE", toteWin: "\u00A36.90" }
    },
    {
      time: "15:30", venue: "Fontwell",
      horses: [
        { position: 1, name: "Alright Dai (IRE)", draw: "1", odds: "7/4 f" },
        { position: 2, name: "Hatos (FR)", draw: "7", odds: "11/2" }
      ],
      details: { trainer: "N P Mulholland", jockey: "C O'Farrell", runners: "6 ran", distances: "6\u00BD", toteWin: "\u00A33.10" }
    },
    {
      time: "15:12", venue: "Chelmsford City",
      horses: [
        { position: 1, name: "Dream Composer (IRE)", draw: "4", odds: "5/2" },
        { position: 2, name: "Spirit Dancer", draw: "2", odds: "7/2" },
        { position: 3, name: "Harbour Front", draw: "6", odds: "10/1" }
      ],
      details: { trainer: "J Tuite", jockey: "R Havlin", runners: "9 ran", distances: "2, nk" }
    },
    {
      time: "15:00", venue: "Fontwell",
      horses: [
        { position: 1, name: "Sizing Cusimano (IRE)", draw: "3", odds: "6/4 f" },
        { position: 2, name: "Our Doris", draw: "5", odds: "9/2" },
        { position: 3, name: "Bagatelle (FR)", draw: "1", odds: "7/1" }
      ],
      details: { trainer: "G L Moore", jockey: "J J Burke", runners: "7 ran", distances: "3\u00BD, 8" }
    },
    {
      time: "14:30", venue: "Punchestown",
      horses: [
        { position: 1, name: "Doyen Breed (IRE)", draw: "2", odds: "11/4" },
        { position: 2, name: "Firm Footings (IRE)", draw: "6", odds: "5/1" },
        { position: 3, name: "Inca Prince (IRE)", draw: "4", odds: "8/1" }
      ],
      details: { trainer: "W P Mullins", jockey: "P Townend", runners: "11 ran", distances: "1\u00BD, 3\u00BC" }
    },
    {
      time: "14:00", venue: "Punchestown",
      horses: [
        { position: 1, name: "Harbour Lake (IRE)", draw: "1", odds: "4/6 f" },
        { position: 2, name: "Ballybrown (IRE)", draw: "3", odds: "5/1" }
      ],
      details: { trainer: "H De Bromhead", jockey: "R Blackmore", runners: "5 ran", distances: "12" }
    }
  ];

  // ===== App State =====
  let allRaces = FALLBACK_RACES;  // Start with fallback immediately
  let activeFilter = 'all';
  let countdown = 60;
  let isLive = false;

  // ===== RENDER IMMEDIATELY with fallback data =====
  renderTabs();
  renderResults();
  updateStatus();

  // ===== Then try live fetch in background =====
  attemptLiveFetch();

  // ===== Auto-refresh countdown =====
  setInterval(function() {
    countdown--;
    if (countdown <= 0) {
      countdown = 60;
      attemptLiveFetch();
    }
    document.getElementById('updateTimer').textContent = 'Refreshing in ' + countdown + 's';
  }, 1000);

  // ===== Live Fetch (completely wrapped in try/catch) =====
  async function attemptLiveFetch() {
    var PROXIES = [
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?',
      'https://api.codetabs.com/v1/proxy?quest='
    ];
    var TARGET = 'https://www.sportinglife.com/racing/fast-results';

    try {
      var html = null;

      for (var i = 0; i < PROXIES.length; i++) {
        try {
          var controller = new AbortController();
          var timeoutId = setTimeout(function() { controller.abort(); }, 8000);
          var resp = await fetch(PROXIES[i] + encodeURIComponent(TARGET), {
            cache: 'no-store',
            signal: controller.signal
          });
          clearTimeout(timeoutId);
          if (resp.ok) {
            html = await resp.text();
            if (html && html.length > 500) break;
            html = null;
          }
        } catch (proxyErr) {
          // This proxy failed, try next
          continue;
        }
      }

      if (html) {
        var parsed = parseHTML(html);
        if (parsed && parsed.length > 0) {
          allRaces = parsed;
          isLive = true;
          renderTabs();
          renderResults();
          updateStatus();
          return;
        }
      }
    } catch (outerErr) {
      // Total failure — just keep showing what we have
    }

    // If we got here, live fetch failed — keep existing data
    isLive = false;
    updateStatus();
  }

  // ===== HTML Parser =====
  function parseHTML(html) {
    try {
      var doc = new DOMParser().parseFromString(html, 'text/html');
      var races = [];
      var seenKeys = {};

      var links = doc.querySelectorAll('a[href*="/racing/results/"]');
      for (var li = 0; li < links.length; li++) {
        var link = links[li];
        if (link.textContent.indexOf('Full Result') === -1) continue;

        var href = link.getAttribute('href') || '';
        var parts = href.split('/');
        var slug = parts[4] || '';
        var venue = slug.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });

        // Walk up DOM to find the race container
        var container = link.parentElement;
        for (var up = 0; up < 12; up++) {
          if (!container || !container.parentElement) break;
          container = container.parentElement;
          var ct = container.textContent || '';
          if (ct.indexOf('Winning Trainer') !== -1 || ct.indexOf('Tote Win') !== -1) break;
        }
        if (!container) continue;

        var blockText = container.textContent || '';
        var timeMatch = blockText.match(/(\d{2}:\d{2})/);
        if (!timeMatch) continue;
        var time = timeMatch[1];
        var key = time + '|' + venue;
        if (seenKeys[key]) continue;
        seenKeys[key] = true;

        // Extract horses
        var horses = [];
        var horseLinks = container.querySelectorAll('a[href*="/racing/profiles/horse/"]');
        var seenHorses = {};
        for (var hi = 0; hi < horseLinks.length; hi++) {
          var hl = horseLinks[hi];
          var name = hl.textContent.trim();
          if (!name || seenHorses[name]) continue;
          seenHorses[name] = true;

          var parentText = (hl.parentElement ? hl.parentElement.textContent : '') || '';
          var afterName = parentText.split(name)[1] || '';
          var oddsMatch = afterName.match(/(\d+\/\d+\s*[fF]?)/);
          var beforeName = parentText.split(name)[0] || '';
          var drawMatch = beforeName.match(/(\d+)\s*$/);

          horses.push({
            position: horses.length + 1,
            name: name,
            draw: drawMatch ? drawMatch[1] : '',
            odds: oddsMatch ? oddsMatch[1].trim() : ''
          });
        }

        // Extract details
        var details = {};
        var patterns = [
          ['trainer', /Winning Trainer:\s*([^\n|]+)/],
          ['jockey', /Winning Jockey:\s*([^\n|]+)/],
          ['runners', /Runners:\s*([^\n|]+)/],
          ['distances', /Distances?:\s*([^\n|]+)/],
          ['favourite', /Fav:\s*([^\n|]+)/],
          ['toteWin', /Tote Win:\s*([^\n|]+)/]
        ];
        for (var pi = 0; pi < patterns.length; pi++) {
          var m = blockText.match(patterns[pi][1]);
          if (m) details[patterns[pi][0]] = m[1].trim();
        }

        if (horses.length > 0) {
          races.push({ time: time, venue: venue, horses: horses, details: details });
        }
      }

      races.sort(function(a, b) { return b.time.localeCompare(a.time); });
      return races;
    } catch (parseErr) {
      return [];
    }
  }

  // ===== Status badge =====
  function updateStatus() {
    var b = document.getElementById('statusBadge');
    if (isLive) {
      b.className = 'status-badge status-live';
      b.textContent = 'LIVE';
    } else {
      b.className = 'status-badge status-cached';
      b.textContent = 'CACHED';
    }
  }

  // ===== Render Tabs =====
  function renderTabs() {
    var venueSet = {};
    for (var i = 0; i < allRaces.length; i++) venueSet[allRaces[i].venue] = true;
    var venueList = Object.keys(venueSet).sort();

    var el = document.getElementById('tabs');
    var html = '<button class="tab' + (activeFilter === 'all' ? ' active' : '') + '" data-filter="all" tabindex="0">All Meetings</button>';
    for (var v = 0; v < venueList.length; v++) {
      html += '<button class="tab' + (activeFilter === venueList[v] ? ' active' : '') + '" data-filter="' + venueList[v] + '" tabindex="0">' + venueList[v] + '</button>';
    }
    el.innerHTML = html;

    var tabs = el.querySelectorAll('.tab');
    for (var t = 0; t < tabs.length; t++) {
      tabs[t].addEventListener('click', function() {
        activeFilter = this.getAttribute('data-filter');
        var allTabs = document.querySelectorAll('.tab');
        for (var j = 0; j < allTabs.length; j++) allTabs[j].classList.remove('active');
        this.classList.add('active');
        renderResults();
      });
    }
  }

  // ===== Render Results =====
  function renderResults() {
    var container = document.getElementById('results');
    var filtered = [];
    for (var i = 0; i < allRaces.length; i++) {
      if (activeFilter === 'all' || allRaces[i].venue === activeFilter) {
        filtered.push(allRaces[i]);
      }
    }

    if (filtered.length === 0) {
      container.innerHTML = '<div class="state-message"><div class="state-text">No results available</div><div style="color:var(--text-dim);font-size:16px">Results appear as races finish</div></div>';
      return;
    }

    var html = '';
    for (var r = 0; r < filtered.length; r++) {
      var race = filtered[r];
      html += '<div class="race-card" tabindex="0" data-idx="' + r + '">';
      html += '<div class="race-header"><div class="race-header-left">';
      html += '<span class="race-time">' + race.time + '</span>';
      html += '<span class="race-venue">' + race.venue + '</span>';
      html += '</div><div class="race-meta">';
      if (race.details.runners) html += '<span class="race-meta-item">\uD83D\uDC65 ' + race.details.runners + '</span>';
      if (race.details.distances) html += '<span class="race-meta-item">\uD83D\uDCCF ' + race.details.distances + '</span>';
      html += '<span class="expand-hint">Press Enter for details</span>';
      html += '</div></div>';

      for (var h = 0; h < race.horses.length; h++) {
        var horse = race.horses[h];
        var posClass = horse.position <= 3 ? ' pos-' + horse.position : '';
        var nameClass = horse.position === 1 ? ' winner-name' : '';
        var isFav = /f$/i.test(horse.odds);

        html += '<div class="horse-row">';
        html += '<div class="position' + posClass + '">' + horse.position + '</div>';
        html += '<div class="horse-info">';
        if (horse.draw) html += '<span class="horse-number">#' + horse.draw + '</span>';
        html += '<span class="horse-name' + nameClass + '">' + horse.name + '</span>';
        html += '</div>';
        html += '<div class="horse-odds">' + horse.odds + (isFav ? '<span class="fav-tag">FAV</span>' : '') + '</div>';
        html += '</div>';
      }

      var d = race.details;
      var hasDetails = d.trainer || d.jockey || d.favourite || d.toteWin;
      if (hasDetails) {
        html += '<div class="race-details">';
        if (d.trainer) html += '<div class="detail-row"><span class="detail-label">Trainer</span><span class="detail-value">' + d.trainer + '</span></div>';
        if (d.jockey) html += '<div class="detail-row"><span class="detail-label">Jockey</span><span class="detail-value">' + d.jockey + '</span></div>';
        if (d.favourite) html += '<div class="detail-row"><span class="detail-label">Fav (Unplaced)</span><span class="detail-value">' + d.favourite + '</span></div>';
        if (d.toteWin) html += '<div class="detail-row"><span class="detail-label">Tote Win</span><span class="detail-value">' + d.toteWin + '</span></div>';
        if (d.runners) html += '<div class="detail-row"><span class="detail-label">Runners</span><span class="detail-value">' + d.runners + '</span></div>';
        if (d.distances) html += '<div class="detail-row"><span class="detail-label">Distances</span><span class="detail-value">' + d.distances + '</span></div>';
        html += '</div>';
      }

      html += '</div>';
    }

    container.innerHTML = html;

    // Attach expand/collapse to each card
    var cards = container.querySelectorAll('.race-card');
    for (var c = 0; c < cards.length; c++) {
      (function(card) {
        function toggle() {
          var det = card.querySelector('.race-details');
          if (det) det.classList.toggle('expanded');
        }
        card.addEventListener('click', toggle);
        card.addEventListener('keydown', function(e) { if (e.key === 'Enter') toggle(); });
      })(cards[c]);
    }
  }

  // ===== Keyboard Navigation =====
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace') {
      e.preventDefault();
      window.location.href = 'index.html';
    }
  });

  document.getElementById('results').addEventListener('keydown', function(e) {
    var cards = Array.prototype.slice.call(document.querySelectorAll('.race-card'));
    var idx = cards.indexOf(document.activeElement);
    if (e.key === 'ArrowDown' && idx < cards.length - 1) {
      e.preventDefault();
      cards[idx + 1].focus();
      cards[idx + 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (idx > 0) {
        cards[idx - 1].focus();
        cards[idx - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } else {
        var activeTab = document.querySelector('.tab.active');
        if (activeTab) activeTab.focus();
      }
    }
  });

  document.getElementById('tabs').addEventListener('keydown', function(e) {
    var tabs = Array.prototype.slice.call(document.querySelectorAll('.tab'));
    var idx = tabs.indexOf(document.activeElement);
    if (e.key === 'ArrowRight' && idx < tabs.length - 1) { e.preventDefault(); tabs[idx + 1].focus(); }
    if (e.key === 'ArrowLeft' && idx > 0) { e.preventDefault(); tabs[idx - 1].focus(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); var firstCard = document.querySelector('.race-card'); if (firstCard) firstCard.focus(); }
    if (e.key === 'Enter') { if (document.activeElement) document.activeElement.click(); }
  });

})();
</script>
</body>
</html>
