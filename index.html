<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>TV Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #08090e;
    --surface: #0f1117;
    --card: #13151d;
    --border: #1c1f2e;
    --text: #d8dae5;
    --text-mid: #8a8da3;
    --text-dim: #4e5168;
    --accent-green: #34d399;
    --accent-blue: #60a5fa;
    --accent-orange: #fb923c;
    --accent-purple: #a78bfa;
    --accent-amber: #fbbf24;
    --accent-slate: #94a3b8;
    --radius: 12px;
  }
  html, body {
    width:1920px; height:1080px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    width:1920px; height:1080px;
    display: flex; flex-direction: column;
    padding: 28px 48px 20px;
  }

  /* === Header — compact single row === */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; flex-shrink: 0;
    height: 36px;
  }
  .logo {
    font-family: 'Inter', sans-serif;
    font-size: 20px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--text);
  }
  .logo span { color: var(--text-dim); font-weight: 400; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 500;
    color: var(--text-mid);
    letter-spacing: 1px;
  }
  .date-text {
    font-size: 13px; color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* === Tile Grid === */
  .tile-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 16px;
    min-height: 0;
  }

  .tile {
    position: relative;
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 24px 28px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--card);
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    outline: none;
    transition: transform 0.22s cubic-bezier(.22,1,.36,1),
                box-shadow 0.22s ease,
                border-color 0.22s ease,
                background 0.22s ease;
  }
  .tile::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    opacity: 0; transition: opacity 0.25s ease;
  }
  .tile:focus {
    transform: scale(1.025);
    background: #161a26;
    z-index: 5;
  }
  .tile:focus::after { opacity: 1; }

  .tile-top { display: flex; align-items: center; justify-content: space-between; }
  .tile-icon-wrap {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .tile-icon-wrap svg { width: 20px; height: 20px; }

  .tile-bottom { margin-top: auto; }
  .tile-title {
    font-size: 18px; font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 3px;
    line-height: 1.2;
  }
  .tile-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.3;
    letter-spacing: 0.2px;
  }

  /* Per-tile accents */
  .tile--racing .tile-icon-wrap { background: rgba(52,211,153,0.1); }
  .tile--racing .tile-icon-wrap svg { color: var(--accent-green); }
  .tile--racing::after { background: var(--accent-green); }
  .tile--racing:focus { border-color: rgba(52,211,153,0.5); box-shadow: 0 0 0 2px rgba(52,211,153,0.2), 0 8px 24px rgba(0,0,0,0.3); }

  .tile--weather .tile-icon-wrap { background: rgba(96,165,250,0.1); }
  .tile--weather .tile-icon-wrap svg { color: var(--accent-blue); }
  .tile--weather::after { background: var(--accent-blue); }
  .tile--weather:focus { border-color: rgba(96,165,250,0.5); box-shadow: 0 0 0 2px rgba(96,165,250,0.2), 0 8px 24px rgba(0,0,0,0.3); }

  .tile--news .tile-icon-wrap { background: rgba(251,146,60,0.1); }
  .tile--news .tile-icon-wrap svg { color: var(--accent-orange); }
  .tile--news::after { background: var(--accent-orange); }
  .tile--news:focus { border-color: rgba(251,146,60,0.5); box-shadow: 0 0 0 2px rgba(251,146,60,0.2), 0 8px 24px rgba(0,0,0,0.3); }

  .tile--sports .tile-icon-wrap { background: rgba(167,139,250,0.1); }
  .tile--sports .tile-icon-wrap svg { color: var(--accent-purple); }
  .tile--sports::after { background: var(--accent-purple); }
  .tile--sports:focus { border-color: rgba(167,139,250,0.5); box-shadow: 0 0 0 2px rgba(167,139,250,0.2), 0 8px 24px rgba(0,0,0,0.3); }

  .tile--clock .tile-icon-wrap { background: rgba(251,191,36,0.1); }
  .tile--clock .tile-icon-wrap svg { color: var(--accent-amber); }
  .tile--clock::after { background: var(--accent-amber); }
  .tile--clock:focus { border-color: rgba(251,191,36,0.5); box-shadow: 0 0 0 2px rgba(251,191,36,0.2), 0 8px 24px rgba(0,0,0,0.3); }

  .tile--settings .tile-icon-wrap { background: rgba(148,163,184,0.1); }
  .tile--settings .tile-icon-wrap svg { color: var(--accent-slate); }
  .tile--settings::after { background: var(--accent-slate); }
  .tile--settings:focus { border-color: rgba(148,163,184,0.5); box-shadow: 0 0 0 2px rgba(148,163,184,0.2), 0 8px 24px rgba(0,0,0,0.3); }

  /* Live badge */
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.2);
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent-green);
  }
  .live-dot {
    width: 6px; height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.3; transform:scale(0.7); }
  }

  /* Entrance */
  .tile { opacity:0; transform:translateY(16px); }
  .tile.show { opacity:1; transform:translateY(0); transition: opacity 0.4s ease, transform 0.4s cubic-bezier(.22,1,.36,1); }

  /* Footer */
  .nav-hint {
    flex-shrink: 0; text-align: center; padding-top: 16px;
    font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px;
  }
  .nav-hint kbd {
    display:inline-block; background:var(--surface); border:1px solid var(--border);
    border-radius:4px; padding:1px 6px; font-family:'JetBrains Mono',monospace;
    font-size:10px; margin:0 1px;
  }
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="logo">TV <span>Hub</span></div>
    <div class="header-right">
      <div class="date-text" id="dateText"></div>
      <div class="clock" id="clock"></div>
    </div>
  </header>

  <div class="tile-grid" id="grid">
    <a href="racing.html" class="tile tile--racing" data-row="0" data-col="0" tabindex="0">
      <div class="tile-top">
        <div class="tile-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <span class="live-badge"><span class="live-dot"></span>Live</span>
      </div>
      <div class="tile-bottom">
        <div class="tile-title">Horse Racing</div>
        <div class="tile-desc">Live results & fast updates</div>
      </div>
    </a>
    <a href="weather.html" class="tile tile--weather" data-row="0" data-col="1" tabindex="-1">
      <div class="tile-top">
        <div class="tile-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
        </div>
      </div>
      <div class="tile-bottom">
        <div class="tile-title">Weather</div>
        <div class="tile-desc">Forecast & conditions</div>
      </div>
    </a>
    <a href="news.html" class="tile tile--news" data-row="0" data-col="2" tabindex="-1">
      <div class="tile-top">
        <div class="tile-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
        </div>
      </div>
      <div class="tile-bottom">
        <div class="tile-title">News</div>
        <div class="tile-desc">Headlines & breaking stories</div>
      </div>
    </a>
    <a href="sports.html" class="tile tile--sports" data-row="1" data-col="0" tabindex="-1">
      <div class="tile-top">
        <div class="tile-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m4.93 4.93 4.24 4.24"/><path d="m14.83 9.17 4.24-4.24"/><path d="m14.83 14.83 4.24 4.24"/><path d="m9.17 14.83-4.24 4.24"/><circle cx="12" cy="12" r="4"/></svg>
        </div>
      </div>
      <div class="tile-bottom">
        <div class="tile-title">Sports</div>
        <div class="tile-desc">Scores & fixtures</div>
      </div>
    </a>
    <a href="clock.html" class="tile tile--clock" data-row="1" data-col="1" tabindex="-1">
      <div class="tile-top">
        <div class="tile-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
      </div>
      <div class="tile-bottom">
        <div class="tile-title">World Clock</div>
        <div class="tile-desc">Times across the globe</div>
      </div>
    </a>
    <a href="settings.html" class="tile tile--settings" data-row="1" data-col="2" tabindex="-1">
      <div class="tile-top">
        <div class="tile-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
      </div>
      <div class="tile-bottom">
        <div class="tile-title">Settings</div>
        <div class="tile-desc">Display & preferences</div>
      </div>
    </a>
  </div>

  <div class="nav-hint">
    <kbd>&#8592;</kbd><kbd>&#8594;</kbd><kbd>&#8593;</kbd><kbd>&#8595;</kbd> navigate &middot; <kbd>Enter</kbd> select &middot; <kbd>Backspace</kbd> back
  </div>
</div>

<script>
  function updateClock() {
    var now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('dateText').textContent = now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  }
  updateClock(); setInterval(updateClock, 10000);

  var tiles = document.querySelectorAll('.tile');
  tiles.forEach(function(t,i){ setTimeout(function(){ t.classList.add('show'); }, 80+i*60); });

  var COLS=3, ROWS=2, curRow=0, curCol=0;
  function focusTile(r,c){
    curRow=r; curCol=c;
    var el=document.querySelector('.tile[data-row="'+r+'"][data-col="'+c+'"]');
    if(el) el.focus();
  }
  document.addEventListener('keydown',function(e){
    switch(e.key){
      case 'ArrowRight': e.preventDefault(); focusTile(curRow,(curCol+1)%COLS); break;
      case 'ArrowLeft': e.preventDefault(); focusTile(curRow,(curCol-1+COLS)%COLS); break;
      case 'ArrowDown': e.preventDefault(); focusTile((curRow+1)%ROWS,curCol); break;
      case 'ArrowUp': e.preventDefault(); focusTile((curRow-1+ROWS)%ROWS,curCol); break;
      case 'Enter': var el=document.querySelector('.tile[data-row="'+curRow+'"][data-col="'+curCol+'"]'); if(el) el.click(); break;
    }
  });
  setTimeout(function(){ focusTile(0,0); },500);
</script>
</body>
</html>
